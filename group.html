<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="conainer">
      <h2>Bootstrap demo</h2>
      <button class="btn btn-success">one</button>
      <button class="btn btn-success">two</button>
      <button class="btn btn-success">three</button>
      <!-- without grouping -->
      <!-- withgrouping -->
       <br><br>
      <div class="btn-group"> 
        <button class="btn btn-primary">one</button>
        <button class="btn btn-success">two</button>
        <button class="btn btn-danger">three</button>
      </div>
       <br><br>
      <div class="btn-group"> 
        <button class="btn btn-outline-success">one</button>
        <button class="btn btn-outline-success">two</button>
        <button class="btn btn-outline-success">three</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
