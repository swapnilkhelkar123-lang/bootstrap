<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container">
      <h2>bootstrap Form</h2>
      <form>
        <div class="row">
        <div class="mb-3 col-md-6">
          <!-- <form class="mb-3">  ye na karke ham individual div ko marging border denge to aur accha spacing milinega-->
          <label for="email" class="form-label">email</label>
          <input
            type="text"
            class="form-control"
            placeholder="enter email"
            id="email"
          />
        </div>
        <div class="mb-3 col-md-6">
          <label for="password" class="form-label">password</label>
          <input
            type="password"
            class="form-control"
            placeholder="enter password"
            id="password"
          />
        </div>
        </div>
        <div class="mb-3">
          <label for="address" class="form-label">address</label>
          <input
            type="address"
            class="form-control-lg"
            placeholder="enter address"
            id="address"
          />
        </div>
        <div class="mb-3">
          <select class="form-select form-select-lg">
            <option selected>pick one of the option</option>
            <option value="1">one</option>
            <option value="2">two</option>
            <option value="3">three</option>
          </select>
        </div>
        <!-- this is using without bootstrap -->
        <div class="normal mb-3">
          <input type="checkbox" id="agree" />
          <label for="agree">agree</label>
        </div>
        <!-- this is using with bootstrap -->
        <div class="form-check mb-3">
          <input type="checkbox" id="agreebs" class="form-check-input" />
          <label for="agreebs" class="form-check-label">agree</label>
        </div>
        <div class="form-check mb-3">
          <input type="radio" id="radiobs" class="form-check-input" />
          <label for="radiobs" class="form-check-label">Yes/No</label>
        </div>
        <div class="form-check form-switch mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            role="switch"
            id="switchCheckDefault"
          />
          <label class="form-check-label" for="switchCheckDefault"
            >Default switch checkbox input</label
          >
        </div>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
