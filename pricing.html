<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing</title>
    <link
      rel="stylesheet"
      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="text-center mb-5">Pricing Plans</h1>

      <div class="row g-4">
        <div class="col-md-4">
          <div class="card text-center h-100">
            <div class="card-body">
              <h3>Regular Pizza</h3>
              <h2 class="text-danger">₹199</h2>
              <p>Small Size Pizza</p>
              <p>2 Toppings</p>
              <p>Free Delivery</p>
              <button class="btn btn-danger">Order Now</button>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-center h-100">
            <div class="card-body">
              <h3>Medium Pizza</h3>
              <h2 class="text-danger">₹349</h2>
              <p>Medium Size Pizza</p>
              <p>4 Toppings</p>
              <p>Free Delivery</p>
              <button class="btn btn-danger">Order Now</button>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-center h-100">
            <div class="card-body">
              <h3>Large Pizza</h3>
              <h2 class="text-danger">₹499</h2>
              <p>Large Size Pizza</p>
              <p>Unlimited Toppings</p>
              <p>Free Delivery</p>
              <button class="btn btn-danger">Order Now</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
